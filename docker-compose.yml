services:
  homunculus-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homunculus-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RUBY_YJIT_ENABLE=1
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - ./workspace:/app/workspace
      - homunculus-data:/app/data
      # Docker socket for sandbox: agent spawns sibling containers via docker run
      - /var/run/docker.sock:/var/run/docker.sock
    # Access to docker socket for sandbox. Default 999 matches common Linux docker group.
    # Override: DOCKER_GID=$(stat -c '%g' /var/run/docker.sock) in .env
    group_add:
      - "${DOCKER_GID:-999}"
    networks:
      - homunculus-net
      - telegram-egress
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:18789:18789"
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=100M

  # Optional: Ollama running as a Docker service.
  # Start with: docker compose --profile ollama up -d
  # REQUIRED: Add OLLAMA_BASE_URL=http://ollama:11434 to .env — without it,
  # Homunculus will timeout trying to reach Ollama via host.docker.internal.
  ollama:
    image: ollama/ollama:latest
    container_name: homunculus-ollama
    profiles:
      - ollama
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - homunculus-net
      - ollama-egress
    ports:
      - "127.0.0.1:11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Optional: SearXNG running as a Docker service.
  # Start with: docker compose --profile searxng up -d
  # REQUIRED: Add SEARXNG_URL=http://searxng:8080 to .env — without it,
  # Homunculus will timeout trying to reach SearXNG via host.docker.internal.
  searxng:
    image: searxng/searxng:latest
    container_name: homunculus-searxng
    profiles:
      - searxng
    volumes:
      - ./config/searxng:/etc/searxng:rw
    networks:
      - homunculus-net
      - searxng-egress
    ports:
      - "127.0.0.1:8888:8080"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  homunculus-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    container_name: homunculus-sandbox
    profiles:
      - sandbox
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:size=100M,noexec
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1.0
    volumes:
      - ./workspace:/workspace:ro

  # Optional: ntfy notification sidecar.
  # Start with: docker compose --profile ntfy up -d
  # REQUIRED: Add FAMILIARS_NTFY_URL=http://ntfy:80 and FAMILIARS_NTFY_TOKEN=<token> to .env
  # User subscribes via browser at http://localhost:2586 (topic: homunculus)
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: homunculus-ntfy
    profiles:
      - ntfy
    command: serve
    volumes:
      - ./config/ntfy:/etc/ntfy:ro
      - ntfy-cache:/var/cache/ntfy
    networks:
      - homunculus-net
      - ntfy-egress
    ports:
      - "127.0.0.1:2586:80"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  homunculus-net:
    driver: bridge
    internal: true  # No external access
  telegram-egress:
    driver: bridge  # Allows outbound to Telegram API
  ollama-egress:
    driver: bridge  # Allows Ollama to pull models from registry.ollama.ai
  searxng-egress:
    driver: bridge  # Allows SearXNG to reach external search engines
  ntfy-egress:
    driver: bridge  # Allows ntfy to send Web Push notifications to FCM/APNS

volumes:
  homunculus-data:
    driver: local
  ollama-data:
    driver: local
  ntfy-cache:
    driver: local
